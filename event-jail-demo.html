<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos — Send to Jail Event Animation Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  .controls {
    position: fixed; top: 20px; z-index: 100;
    display: flex; gap: 12px; align-items: center;
  }
  .controls button {
    padding: 10px 24px; border: 2px solid #ff4444; border-radius: 8px;
    background: rgba(255,68,68,0.15); color: #ff4444;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .controls button:hover {
    background: rgba(255,68,68,0.35);
    box-shadow: 0 0 20px rgba(255,68,68,0.3);
  }
  .controls .label { color: #665; font-size: 13px; }

  .stage {
    position: relative; width: 440px; height: 520px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; border-radius: 20px;
    --ev-color: 255, 68, 68;
  }

  /* ── Dark red pulse background ───────────────────────── */
  .bg-danger {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, rgba(80,10,10,0.8) 0%, rgba(10,5,5,0.95) 70%);
    opacity: 0;
  }
  .playing .bg-danger { animation: jailBgIn 5s ease-out forwards; }
  @keyframes jailBgIn {
    0%  { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 1; }
  }

  /* ── JAIL backdrop image ─────────────────────────────── */
  .jail-backdrop {
    position: absolute; width: 440px; height: 520px;
    top: 0; left: 0; z-index: 2;
    overflow: hidden; border-radius: 20px; opacity: 0;
  }
  .jail-backdrop img {
    width: 70%; height: 70%; object-fit: cover; border-radius: 12px;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    filter: brightness(0.3) saturate(0.4) sepia(0.3);
  }
  .playing .jail-backdrop { animation: jailBackdropIn 5s ease-out forwards; }
  .playing .jail-backdrop img { animation: jailBackdropReveal 5s ease-out forwards; }
  @keyframes jailBackdropIn {
    0% { opacity:0; } 15% { opacity:0.7; } 100% { opacity:0.7; }
  }
  @keyframes jailBackdropReveal {
    0%   { filter: brightness(0.3) saturate(0.4) sepia(0.3); }
    60%  { filter: brightness(0.3) saturate(0.4) sepia(0.3); }
    85%  { filter: brightness(0.5) saturate(0.5) sepia(0.2); }
    100% { filter: brightness(0.6) saturate(0.6) sepia(0.1); }
  }

  /* ── Warning flash ───────────────────────────────────── */
  .warn-flash {
    position: absolute; inset: 0; z-index: 3;
    background: radial-gradient(circle, rgba(255,68,68,0.6) 0%, transparent 60%);
    opacity: 0; border-radius: 20px;
  }
  .playing .warn-flash { animation: jailFlash 5s ease-in-out forwards; }
  @keyframes jailFlash {
    0%  { opacity:0; }
    8%  { opacity:1; }
    16% { opacity:0; }
    22% { opacity:0.7; }
    28% { opacity:0; }
    100%{ opacity:0; }
  }

  /* ── Prison Bars (slide down from top) ───────────────── */
  .prison-bars {
    position: absolute; inset: 0; z-index: 15;
    display: flex; justify-content: space-evenly; align-items: stretch;
    padding: 0 40px;
    pointer-events: none;
  }
  .bar {
    width: 6px;
    background: linear-gradient(180deg, #444 0%, #222 50%, #444 100%);
    border-radius: 3px;
    transform: translateY(-110%);
    opacity: 0;
    box-shadow: 2px 0 8px rgba(0,0,0,0.5), -2px 0 8px rgba(0,0,0,0.5),
                0 0 15px rgba(255,68,68,0.1);
  }
  .playing .bar { animation: barSlide 0.8s cubic-bezier(0.22,1,0.36,1) forwards; }
  .playing .bar:nth-child(1) { animation-delay: 0.9s; }
  .playing .bar:nth-child(2) { animation-delay: 0.95s; }
  .playing .bar:nth-child(3) { animation-delay: 1.0s; }
  .playing .bar:nth-child(4) { animation-delay: 1.05s; }
  .playing .bar:nth-child(5) { animation-delay: 0.92s; }
  .playing .bar:nth-child(6) { animation-delay: 0.98s; }
  .playing .bar:nth-child(7) { animation-delay: 1.02s; }
  @keyframes barSlide {
    0%   { opacity: 0; transform: translateY(-110%); }
    60%  { opacity: 1; transform: translateY(2%); }
    80%  { transform: translateY(-1%); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ── Horizontal cross-bars ───────────────────────────── */
  .cross-bar {
    position: absolute; left: 40px; right: 40px;
    height: 5px; z-index: 16;
    background: linear-gradient(90deg, #333, #555, #333);
    border-radius: 2px; opacity: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .cross-bar:nth-child(1) { top: 25%; }
  .cross-bar:nth-child(2) { top: 75%; }
  .playing .cross-bar { animation: crossBarIn 0.6s ease-out forwards; }
  .playing .cross-bar:nth-child(1) { animation-delay: 1.4s; }
  .playing .cross-bar:nth-child(2) { animation-delay: 1.5s; }
  @keyframes crossBarIn {
    0%   { opacity:0; transform: scaleX(0); }
    100% { opacity:1; transform: scaleX(1); }
  }

  /* ── Event Card ──────────────────────────────────────── */
  .event-card {
    position: absolute; z-index: 10;
    width: 160px; height: 200px;
    border-radius: 12px; overflow: hidden;
    opacity: 0;
    transform: scale(0.3) rotateY(90deg);
    box-shadow: 0 0 30px rgba(255,68,68,0.4), 0 8px 30px rgba(0,0,0,0.6);
    border: 2px solid rgba(255,68,68,0.3);
  }
  .event-card img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .playing .event-card {
    animation: jailCardFlip 4.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
  }
  @keyframes jailCardFlip {
    0%   { opacity:0; transform: scale(0.3) rotateY(90deg); }
    15%  { opacity:1; transform: scale(1.05) rotateY(0deg); }
    22%  { transform: scale(1) rotateY(0deg); }
    55%  { opacity:1; transform: scale(1) rotateY(0deg); }
    75%  { opacity:0; transform: scale(0.8) translateY(20px);
           filter: brightness(0.5); }
    100% { opacity:0; }
  }

  /* ── Event Name (top) ────────────────────────────────── */
  .event-name {
    position: absolute; top: 40px; left: 50%;
    transform: translateX(-50%); opacity: 0; z-index: 20;
    text-align: center; white-space: nowrap;
  }
  .event-name-main {
    font-size: 16px; font-weight: 700;
    color: rgba(255,100,100,0.9); letter-spacing: 2px;
    text-shadow: 0 0 15px rgba(255,68,68,0.4);
  }
  .event-name-sub {
    font-size: 11px; font-weight: 400;
    color: rgba(200,160,160,0.6); letter-spacing: 1.5px; margin-top: 4px;
  }
  .playing .event-name { animation: jailNameIn 4s ease-out 0.6s forwards; }
  @keyframes jailNameIn {
    0%   { opacity:0; transform: translateX(-50%) translateY(10px); }
    12%  { opacity:1; transform: translateX(-50%) translateY(0); }
    50%  { opacity:1; }
    70%  { opacity:0; }
    100% { opacity:0; }
  }

  /* ── "JAILED" Badge ──────────────────────────────────── */
  .jail-badge {
    position: absolute; bottom: 70px; left: 50%;
    transform: translateX(-50%) scale(0); opacity: 0;
    z-index: 20; text-align: center;
  }
  .playing .jail-badge { animation: jailBadgeIn 3s cubic-bezier(0.34,1.56,0.64,1) 1.8s forwards; }
  .jail-badge-icon { font-size: 40px; display: block; margin-bottom: 8px; }
  .jail-badge-text {
    font-size: 26px; font-weight: 800; letter-spacing: 8px;
    color: #ff4444;
    text-shadow: 0 0 25px rgba(255,68,68,0.6), 0 0 50px rgba(255,68,68,0.3),
                 0 2px 10px rgba(0,0,0,0.7);
    text-transform: uppercase;
  }
  .jail-badge-sub {
    font-size: 12px; font-weight: 500; color: rgba(255,150,150,0.6);
    letter-spacing: 2px; margin-top: 6px;
  }
  @keyframes jailBadgeIn {
    0%   { opacity:0; transform: translateX(-50%) scale(0); }
    15%  { opacity:1; transform: translateX(-50%) scale(1.15); }
    25%  { opacity:1; transform: translateX(-50%) scale(1); }
    70%  { opacity:1; }
    100% { opacity:0.9; transform: translateX(-50%) scale(1); }
  }

  /* ── Chain links decoration ──────────────────────────── */
  .chain {
    position: absolute; z-index: 17; opacity: 0;
    font-size: 20px; color: rgba(150,150,150,0.4);
    letter-spacing: 4px;
  }
  .chain-left  { left: 15px; top: 50%; transform: translateY(-50%) rotate(90deg); }
  .chain-right { right: 15px; top: 50%; transform: translateY(-50%) rotate(90deg); }
  .playing .chain { animation: chainFade 3s ease-out 1.6s forwards; }
  @keyframes chainFade {
    0%   { opacity:0; } 30% { opacity:0.4; } 100% { opacity:0.3; }
  }

  /* ── Ambient particles (embers) ──────────────────────── */
  .ember {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: rgba(255,100,50,0.8); opacity: 0; z-index: 4;
  }
  .playing .ember { animation: emberFloat 3s ease-out forwards; }
  .ember:nth-child(1)  { left:20%; bottom:10%; --ey:-280px; --ex:30px; }
  .ember:nth-child(2)  { left:40%; bottom:5%;  --ey:-320px; --ex:-20px; }
  .ember:nth-child(3)  { left:60%; bottom:8%;  --ey:-300px; --ex:15px; }
  .ember:nth-child(4)  { left:75%; bottom:12%; --ey:-260px; --ex:-25px; }
  .ember:nth-child(5)  { left:30%; bottom:3%;  --ey:-350px; --ex:10px; }
  .ember:nth-child(6)  { left:55%; bottom:15%; --ey:-240px; --ex:-15px; }
  .ember:nth-child(7)  { left:80%; bottom:6%;  --ey:-310px; --ex:20px; }
  .ember:nth-child(8)  { left:15%; bottom:9%;  --ey:-290px; --ex:-10px; }
  .playing .ember:nth-child(1) { animation-delay:0.5s; }
  .playing .ember:nth-child(2) { animation-delay:0.8s; }
  .playing .ember:nth-child(3) { animation-delay:1.1s; }
  .playing .ember:nth-child(4) { animation-delay:0.6s; }
  .playing .ember:nth-child(5) { animation-delay:1.3s; }
  .playing .ember:nth-child(6) { animation-delay:0.9s; }
  .playing .ember:nth-child(7) { animation-delay:1.5s; }
  .playing .ember:nth-child(8) { animation-delay:0.7s; }
  @keyframes emberFloat {
    0%   { opacity:0; transform: translate(0,0); }
    15%  { opacity:0.8; }
    100% { opacity:0; transform: translate(var(--ex), var(--ey)); }
  }

  .info {
    position: fixed; bottom: 20px; color: #444;
    font-size: 12px; text-align: center; line-height: 1.6;
  }
  .info code {
    background: rgba(255,68,68,0.1); color: #a66;
    padding: 2px 6px; border-radius: 3px; font-size: 11px;
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="playAnimation()">&#9654; Play Send to Jail</button>
  <button onclick="resetAnimation()">&#8635; Reset</button>
  <span class="label">~5s &bull; terminal event &bull; agent imprisoned</span>
</div>

<div class="stage" id="stage">
  <div class="bg-danger"></div>
  <div class="jail-backdrop">
    <img src="../../img/JAIL.png" alt="Jail"
         onerror="this.parentElement.style.background='linear-gradient(135deg,#2a0a0a,#0a0a12)';" />
  </div>
  <div class="warn-flash"></div>

  <!-- Embers -->
  <div class="ember"></div><div class="ember"></div><div class="ember"></div>
  <div class="ember"></div><div class="ember"></div><div class="ember"></div>
  <div class="ember"></div><div class="ember"></div>

  <!-- Event card -->
  <div class="event-card">
    <img src="../../img/EventRec710.png" alt="Event Card"
         onerror="this.style.background='linear-gradient(135deg,#3a1010,#1a0808)';this.style.opacity=1;" />
  </div>

  <div class="event-name">
    <div class="event-name-main">&#x26A0;&#xFE0F; Send to Jail</div>
    <div class="event-name-sub">Recovery Event &bull; Terminal</div>
  </div>

  <!-- Prison bars -->
  <div class="prison-bars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>
  <div class="cross-bar"></div>
  <div class="cross-bar"></div>

  <!-- Chains -->
  <div class="chain chain-left">&#x26D3; &#x26D3; &#x26D3;</div>
  <div class="chain chain-right">&#x26D3; &#x26D3; &#x26D3;</div>

  <!-- Badge -->
  <div class="jail-badge">
    <span class="jail-badge-icon">&#x1F6D1;</span>
    <div class="jail-badge-text">Jailed</div>
    <div class="jail-badge-sub">Agent sent to prison</div>
  </div>
</div>

<div class="info">
  Send to Jail &bull; Terminal event &bull; Prison bars slide down<br>
  <code>JAIL.png</code> backdrop &bull; Red danger theme &bull; Embers + chains
</div>

<script>
  function playAnimation() {
    const stage = document.getElementById('stage');
    stage.classList.remove('playing');
    void stage.offsetWidth;
    stage.classList.add('playing');
  }
  function resetAnimation() {
    document.getElementById('stage').classList.remove('playing');
  }
  setTimeout(playAnimation, 500);
</script>
</body>
</html>
