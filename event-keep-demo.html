<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos — Keep Card Event Animation Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  .controls {
    position: fixed; top: 20px; z-index: 100;
    display: flex; gap: 12px; align-items: center;
  }
  .controls button {
    padding: 10px 24px; border: 2px solid #4ecdc4; border-radius: 8px;
    background: rgba(78,205,196,0.15); color: #4ecdc4;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .controls button:hover {
    background: rgba(78,205,196,0.35);
    box-shadow: 0 0 20px rgba(78,205,196,0.3);
  }
  .controls .label { color: #665; font-size: 13px; }

  .stage {
    position: relative; width: 440px; height: 520px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; border-radius: 20px;
  }

  /* ── Warm glow background ────────────────────────────── */
  .bg-positive {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, rgba(15,25,20,0.9) 0%, rgba(8,12,10,0.98) 70%);
    opacity: 0;
  }
  .playing .bg-positive { animation: keepBgIn 4.5s ease-out forwards; }
  @keyframes keepBgIn {
    0% { opacity:0; } 10% { opacity:1; } 100% { opacity:1; }
  }

  /* ── Radial success glow ─────────────────────────────── */
  .success-glow {
    position: absolute; width: 450px; height: 450px;
    border-radius: 50%; z-index: 2; opacity: 0;
    background: radial-gradient(circle, rgba(78,205,196,0.12) 0%, transparent 65%);
  }
  .playing .success-glow { animation: keepGlow 4s ease-out 0.5s forwards; }
  @keyframes keepGlow {
    0%   { opacity:0; transform: scale(0.3); }
    40%  { opacity:1; }
    100% { opacity:0.6; transform: scale(1.3); }
  }

  /* ── Golden ring burst ───────────────────────────────── */
  .ring-burst {
    position: absolute; width: 300px; height: 300px;
    border-radius: 50%;
    border: 2px solid rgba(200,166,78,0.5);
    z-index: 3; opacity: 0;
    box-shadow: 0 0 20px rgba(200,166,78,0.2),
                inset 0 0 20px rgba(200,166,78,0.1);
  }
  .playing .ring-burst { animation: keepRingBurst 1.5s ease-out 0.8s forwards; }
  @keyframes keepRingBurst {
    0%   { opacity:0; transform: scale(0); }
    30%  { opacity:0.8; transform: scale(0.8); }
    100% { opacity:0; transform: scale(2); }
  }

  /* ── Event Card (main element — larger, glowing) ────── */
  .event-card {
    position: absolute; z-index: 10;
    width: 180px; height: 230px;
    border-radius: 14px; overflow: hidden;
    opacity: 0;
    transform: scale(0.2) translateY(80px) rotateZ(-10deg);
    box-shadow: 0 0 40px rgba(78,205,196,0.4),
                0 0 80px rgba(200,166,78,0.2),
                0 10px 40px rgba(0,0,0,0.5);
    border: 2px solid rgba(78,205,196,0.4);
  }
  .event-card img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .playing .event-card {
    animation: keepCardReveal 4.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
  }
  @keyframes keepCardReveal {
    0%   { opacity:0; transform: scale(0.2) translateY(80px) rotateZ(-10deg); }
    8%   { opacity:0.5; }
    18%  { opacity:1; transform: scale(1.08) translateY(-10px) rotateZ(2deg);
           box-shadow: 0 0 60px rgba(78,205,196,0.6), 0 0 100px rgba(200,166,78,0.3),
                       0 15px 50px rgba(0,0,0,0.4); }
    28%  { transform: scale(1) translateY(0) rotateZ(0deg);
           box-shadow: 0 0 40px rgba(78,205,196,0.4), 0 0 80px rgba(200,166,78,0.2); }
    60%  { opacity:1; transform: scale(1) translateY(0) rotateZ(0deg); }
    /* Card floats upward and shrinks to "hand" */
    78%  { opacity:0.9; transform: scale(0.6) translateY(-60px);
           box-shadow: 0 0 30px rgba(200,166,78,0.5); }
    90%  { opacity:0.7; transform: scale(0.4) translateY(-90px);
           filter: brightness(1.3); }
    100% { opacity:0; transform: scale(0.3) translateY(-110px); }
  }

  /* ── Card shimmer overlay ────────────────────────────── */
  .card-shimmer {
    position: absolute; z-index: 11;
    width: 180px; height: 230px;
    border-radius: 14px; opacity: 0;
    background: linear-gradient(135deg,
      transparent 30%, rgba(255,255,255,0.15) 45%,
      rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.15) 55%,
      transparent 70%);
    background-size: 200% 200%;
    pointer-events: none;
  }
  .playing .card-shimmer {
    animation: keepCardReveal 4.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards,
               keepShimmerSlide 2s ease-in-out 0.8s infinite;
  }
  @keyframes keepShimmerSlide {
    0%   { background-position: 200% 0%; }
    100% { background-position: -200% 0%; }
  }

  /* ── Event Label (top) ───────────────────────────────── */
  .event-label {
    position: absolute; top: 35px; left: 50%;
    transform: translateX(-50%); opacity: 0; z-index: 20;
    text-align: center; white-space: nowrap;
  }
  .event-label-main {
    font-size: 15px; font-weight: 700;
    color: rgba(78,205,196,0.9); letter-spacing: 2px;
    text-shadow: 0 0 15px rgba(78,205,196,0.4);
  }
  .event-label-sub {
    font-size: 11px; font-weight: 400;
    color: rgba(180,200,210,0.5); letter-spacing: 1.5px; margin-top: 3px;
  }
  .playing .event-label { animation: keepLabelIn 4s ease-out 0.5s forwards; }
  @keyframes keepLabelIn {
    0%   { opacity:0; transform: translateX(-50%) translateY(8px); }
    12%  { opacity:1; transform: translateX(-50%) translateY(0); }
    55%  { opacity:1; }
    75%  { opacity:0; }
    100% { opacity:0; }
  }

  /* ── Sparkle stars ───────────────────────────────────── */
  .star {
    position: absolute; opacity: 0; z-index: 5;
    font-size: 14px;
    filter: drop-shadow(0 0 4px rgba(200,166,78,0.6));
  }
  .playing .star { animation: starTwinkle 2s ease-out forwards; }
  .star:nth-child(1)  { top:25%; left:15%; font-size:18px; }
  .star:nth-child(2)  { top:20%; right:18%; font-size:12px; }
  .star:nth-child(3)  { top:40%; left:10%; font-size:10px; }
  .star:nth-child(4)  { top:35%; right:12%; font-size:16px; }
  .star:nth-child(5)  { top:55%; left:8%; font-size:14px; }
  .star:nth-child(6)  { top:60%; right:15%; font-size:11px; }
  .star:nth-child(7)  { top:75%; left:20%; font-size:9px; }
  .star:nth-child(8)  { top:70%; right:22%; font-size:13px; }
  .star:nth-child(9)  { top:15%; left:40%; font-size:10px; }
  .star:nth-child(10) { top:80%; left:45%; font-size:12px; }
  .playing .star:nth-child(1)  { animation-delay:0.6s; }
  .playing .star:nth-child(2)  { animation-delay:0.9s; }
  .playing .star:nth-child(3)  { animation-delay:1.2s; }
  .playing .star:nth-child(4)  { animation-delay:0.8s; }
  .playing .star:nth-child(5)  { animation-delay:1.4s; }
  .playing .star:nth-child(6)  { animation-delay:1.0s; }
  .playing .star:nth-child(7)  { animation-delay:1.6s; }
  .playing .star:nth-child(8)  { animation-delay:1.1s; }
  .playing .star:nth-child(9)  { animation-delay:0.7s; }
  .playing .star:nth-child(10) { animation-delay:1.3s; }
  @keyframes starTwinkle {
    0%   { opacity:0; transform: scale(0) rotate(0deg); }
    30%  { opacity:1; transform: scale(1.3) rotate(30deg); }
    60%  { opacity:0.8; transform: scale(1) rotate(15deg); }
    100% { opacity:0; transform: scale(0.5) rotate(45deg); }
  }

  /* ── "CARD ACQUIRED" Badge ───────────────────────────── */
  .keep-badge {
    position: absolute; bottom: 65px; left: 50%;
    transform: translateX(-50%) scale(0); opacity: 0;
    z-index: 20; text-align: center;
  }
  .playing .keep-badge { animation: keepBadgeIn 3s cubic-bezier(0.34,1.56,0.64,1) 1.5s forwards; }
  .keep-badge-icon { font-size: 36px; display: block; margin-bottom: 6px; }
  .keep-badge-text {
    font-size: 20px; font-weight: 700; letter-spacing: 5px;
    color: #4ecdc4;
    text-shadow: 0 0 20px rgba(78,205,196,0.5), 0 2px 10px rgba(0,0,0,0.5);
    text-transform: uppercase;
  }
  .keep-badge-sub {
    font-size: 13px; font-weight: 600; color: #c8a64e;
    text-shadow: 0 0 10px rgba(200,166,78,0.4);
    margin-top: 6px; letter-spacing: 1px;
  }
  @keyframes keepBadgeIn {
    0%   { opacity:0; transform: translateX(-50%) scale(0); }
    15%  { opacity:1; transform: translateX(-50%) scale(1.1); }
    25%  { opacity:1; transform: translateX(-50%) scale(1); }
    75%  { opacity:1; }
    100% { opacity:0.9; transform: translateX(-50%) scale(1); }
  }

  .info {
    position: fixed; bottom: 20px; color: #444;
    font-size: 12px; text-align: center; line-height: 1.6;
  }
  .info code {
    background: rgba(78,205,196,0.1); color: #5a9;
    padding: 2px 6px; border-radius: 3px; font-size: 11px;
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="playAnimation()">&#9654; Play Keep Card</button>
  <button onclick="resetAnimation()">&#8635; Reset</button>
  <span class="label">~4.5s &bull; escape card acquired &bull; positive event</span>
</div>

<div class="stage" id="stage">
  <div class="bg-positive"></div>
  <div class="success-glow"></div>
  <div class="ring-burst"></div>

  <!-- Stars -->
  <div class="star">&#x2728;</div><div class="star">&#x2B50;</div>
  <div class="star">&#x2728;</div><div class="star">&#x2B50;</div>
  <div class="star">&#x2728;</div><div class="star">&#x2B50;</div>
  <div class="star">&#x2728;</div><div class="star">&#x2B50;</div>
  <div class="star">&#x2728;</div><div class="star">&#x2B50;</div>

  <!-- Event card + shimmer -->
  <div class="event-card">
    <img src="../../img/Event60.png" alt="Event Card"
         onerror="this.style.background='linear-gradient(135deg,#1a2a2e,#0a1520)';this.style.opacity=1;" />
  </div>
  <div class="card-shimmer"></div>

  <div class="event-label">
    <div class="event-label-main">&#x1F0CF; Escape Card</div>
    <div class="event-label-sub">Travel Event &bull; Jail Escape</div>
  </div>

  <div class="keep-badge">
    <span class="keep-badge-icon">&#x1F3B4;</span>
    <div class="keep-badge-text">Card Acquired</div>
    <div class="keep-badge-sub">&#x1F513; Jail Escape Card</div>
  </div>
</div>

<div class="info">
  Keep Card Event &bull; Teal/gold positive theme &bull; Card floats to hand<br>
  <code>Event60.png</code> card &bull; Shimmer + stars + ring burst
</div>

<script>
  function playAnimation() {
    const stage = document.getElementById('stage');
    stage.classList.remove('playing');
    void stage.offsetWidth;
    stage.classList.add('playing');
  }
  function resetAnimation() {
    document.getElementById('stage').classList.remove('playing');
  }
  setTimeout(playAnimation, 500);
</script>
</body>
</html>
