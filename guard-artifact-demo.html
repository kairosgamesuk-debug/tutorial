<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos — Guard Artifact Animation Demo</title>
<style>
  /* ── Reset & Stage ─────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  .controls {
    position: fixed;
    top: 20px;
    z-index: 100;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    padding: 10px 24px;
    border: 2px solid #c8a64e;
    border-radius: 8px;
    background: rgba(200, 166, 78, 0.15);
    color: #c8a64e;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .controls button:hover {
    background: rgba(200, 166, 78, 0.35);
    box-shadow: 0 0 20px rgba(200, 166, 78, 0.3);
  }
  .controls .label {
    color: #665;
    font-size: 13px;
  }

  /* ── Animation Container ───────────────────────────── */
  .stage {
    position: relative;
    width: 440px;
    height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── TL Background Image ───────────────────────────── */
  .tl-backdrop {
    position: absolute;
    width: 440px;
    height: 520px;
    top: 0;
    left: 0;
    z-index: 1;
    overflow: hidden;
    border-radius: 20px;
    opacity: 0;
    animation: none;
  }
  .tl-backdrop img {
    width: 70%;
    height: 70%;
    object-fit: cover;
    border-radius: 12px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: brightness(0.45) saturate(0.7) blur(1px);
  }
  .playing .tl-backdrop {
    animation: backdropReveal 5.5s ease-out 0s forwards;
  }
  @keyframes backdropReveal {
    0%        { opacity: 0; }
    15%       { opacity: 1; }   /* fade in dimmed */
    55%       { opacity: 1; }   /* hold during artifact phase */
    100%      { opacity: 1; }   /* stay visible */
  }
  /* Backdrop image brightens to full after artifact fades */
  .playing .tl-backdrop img {
    animation: backdropBrighten 5.5s ease-out 0s forwards;
  }
  @keyframes backdropBrighten {
    0%        { filter: brightness(0.45) saturate(0.7) blur(1px); }
    55%       { filter: brightness(0.45) saturate(0.7) blur(1px); }  /* hold dim */
    80%       { filter: brightness(0.9) saturate(0.9) blur(0px); }
    100%      { filter: brightness(1.0) saturate(1.0) blur(0px); }   /* full brightness */
  }
  /* Vignette overlay on the TL backdrop */
  .tl-backdrop::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10,10,18,0.7) 85%);
    transition: opacity 2s ease-out;
    pointer-events: none;
  }

  /* ── TL Location Label (top) ───────────────────────── */
  .tl-label {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    z-index: 30;
    font-size: 11px;
    font-weight: 500;
    color: rgba(180,200,220,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: none;
    white-space: nowrap;
  }
  .playing .tl-label {
    animation: labelFade 5.5s ease-out 0.2s forwards;
  }
  @keyframes labelFade {
    0%   { opacity: 0; }
    15%  { opacity: 0.5; }
    65%  { opacity: 0.5; }
    85%  { opacity: 0.9; }
    100% { opacity: 1; }
  }

  /* ── Background Radial Pulse ───────────────────────── */
  .bg-pulse {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,166,78,0.1) 0%, transparent 70%);
    opacity: 0;
    z-index: 2;
    animation: none;
  }
  .playing .bg-pulse {
    animation: bgPulse 3s ease-out 0.3s forwards;
  }
  @keyframes bgPulse {
    0%   { opacity: 0; transform: scale(0.3); }
    40%  { opacity: 1; }
    100% { opacity: 0.5; transform: scale(1.2); }
  }

  /* ── Artifact Image ────────────────────────────────── */
  .artifact-wrap {
    position: relative;
    z-index: 10;
  }

  .artifact-img {
    width: 220px;
    height: 220px;
    border-radius: 16px;
    object-fit: cover;
    opacity: 0;
    transform: scale(0.6) translateY(20px);
    filter: brightness(0.3) saturate(0.3);
    animation: none;
    box-shadow: none;
  }
  .playing .artifact-img {
    animation: artifactReveal 5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
  }
  @keyframes artifactReveal {
    0%   { opacity: 0; transform: scale(0.6) translateY(20px); filter: brightness(0.3) saturate(0.3); }
    12%  { opacity: 1; transform: scale(1.05) translateY(-5px); filter: brightness(1.2) saturate(1.2); }
    24%  { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1) saturate(1);
           box-shadow: 0 0 40px rgba(200,166,78,0.5), 0 0 80px rgba(200,166,78,0.2); }
    60%  { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1) saturate(1);
           box-shadow: 0 0 40px rgba(200,166,78,0.5), 0 0 80px rgba(200,166,78,0.2); }
    85%  { opacity: 0; transform: scale(1.1) translateY(-10px); filter: brightness(1.5) saturate(0.5);
           box-shadow: 0 0 80px rgba(200,166,78,0.8), 0 0 120px rgba(200,166,78,0.3); }
    100% { opacity: 0; transform: scale(1.1) translateY(-10px); }
  }

  /* ── Energy Lines (vertical light beams) ───────────── */
  .energy-beam {
    position: absolute;
    width: 2px;
    height: 0;
    background: linear-gradient(to top, transparent, rgba(200,166,78,0.7), transparent);
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    opacity: 0;
    z-index: 3;
    animation: none;
  }
  .playing .energy-beam { animation: beamShoot 1.5s ease-out forwards; }

  .energy-beam:nth-child(1) { transform: translate(-50%, -100%) rotate(-15deg); }
  .energy-beam:nth-child(2) { transform: translate(-50%, -100%) rotate(0deg); }
  .energy-beam:nth-child(3) { transform: translate(-50%, -100%) rotate(15deg); }
  .energy-beam:nth-child(4) { transform: translate(-50%, -100%) rotate(-8deg); }
  .energy-beam:nth-child(5) { transform: translate(-50%, -100%) rotate(8deg); }

  .playing .energy-beam:nth-child(1) { animation-delay: 0.5s; }
  .playing .energy-beam:nth-child(2) { animation-delay: 0.6s; }
  .playing .energy-beam:nth-child(3) { animation-delay: 0.55s; }
  .playing .energy-beam:nth-child(4) { animation-delay: 0.7s; }
  .playing .energy-beam:nth-child(5) { animation-delay: 0.65s; }

  @keyframes beamShoot {
    0%   { height: 0; opacity: 0; }
    30%  { height: 200px; opacity: 0.8; }
    100% { height: 300px; opacity: 0; }
  }

  /* ── Hex Shield Overlay ────────────────────────────── */
  .hex-shield {
    position: absolute;
    width: 280px;
    height: 280px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0) rotate(30deg);
    opacity: 0;
    z-index: 6;
    animation: none;
  }
  .playing .hex-shield {
    animation: hexAppear 4s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
  }
  .hex-shield svg { width: 100%; height: 100%; }
  @keyframes hexAppear {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(30deg); }
    15%  { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1) rotate(0deg); }
    30%  { opacity: 0.3; transform: translate(-50%, -50%) scale(1.05) rotate(0deg); }
    70%  { opacity: 0.3; }
    100% { opacity: 0; }
  }

  /* ── Sparkle Particles ─────────────────────────────── */
  .sparkles {
    position: absolute;
    width: 300px;
    height: 300px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    pointer-events: none;
  }

  .spark {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #c8a64e;
    opacity: 0;
    animation: none;
    box-shadow: 0 0 6px #c8a64e, 0 0 12px rgba(200,166,78,0.5);
  }
  .playing .spark { animation: sparkle 1.8s ease-out forwards; }

  .spark:nth-child(1)  { top: 50%; left: 50%; --tx: -80px; --ty: -90px; }
  .spark:nth-child(2)  { top: 50%; left: 50%; --tx:  70px; --ty: -85px; }
  .spark:nth-child(3)  { top: 50%; left: 50%; --tx: -95px; --ty:  20px; }
  .spark:nth-child(4)  { top: 50%; left: 50%; --tx:  90px; --ty:  30px; }
  .spark:nth-child(5)  { top: 50%; left: 50%; --tx: -40px; --ty: -110px; }
  .spark:nth-child(6)  { top: 50%; left: 50%; --tx:  50px; --ty: -100px; }
  .spark:nth-child(7)  { top: 50%; left: 50%; --tx: -110px;--ty: -30px; }
  .spark:nth-child(8)  { top: 50%; left: 50%; --tx:  100px;--ty: -10px; }
  .spark:nth-child(9)  { top: 50%; left: 50%; --tx: -60px; --ty:  80px; }
  .spark:nth-child(10) { top: 50%; left: 50%; --tx:  65px; --ty:  75px; }
  .spark:nth-child(11) { top: 50%; left: 50%; --tx: -30px; --ty: -130px; background: #6bc4ff; box-shadow: 0 0 6px #6bc4ff; }
  .spark:nth-child(12) { top: 50%; left: 50%; --tx:  35px; --ty: -120px; background: #6bc4ff; box-shadow: 0 0 6px #6bc4ff; }
  .spark:nth-child(13) { top: 50%; left: 50%; --tx: -120px;--ty:  50px;  background: #6bc4ff; box-shadow: 0 0 6px #6bc4ff; }
  .spark:nth-child(14) { top: 50%; left: 50%; --tx:  115px;--ty:  40px;  background: #6bc4ff; box-shadow: 0 0 6px #6bc4ff; }
  .spark:nth-child(15) { top: 50%; left: 50%; --tx:  0px;  --ty: -140px; width: 6px; height: 6px; }
  .spark:nth-child(16) { top: 50%; left: 50%; --tx: -100px;--ty: -70px;  width: 3px; height: 3px; }
  .spark:nth-child(17) { top: 50%; left: 50%; --tx:  80px; --ty: -60px;  width: 5px; height: 5px; }
  .spark:nth-child(18) { top: 50%; left: 50%; --tx: -50px; --ty:  100px; }
  .spark:nth-child(19) { top: 50%; left: 50%; --tx:  40px; --ty:  95px;  background: #fff; box-shadow: 0 0 8px #fff; }
  .spark:nth-child(20) { top: 50%; left: 50%; --tx:  0px;  --ty:  120px; background: #fff; box-shadow: 0 0 8px #fff; }

  .playing .spark:nth-child(1)  { animation-delay: 0.8s; }
  .playing .spark:nth-child(2)  { animation-delay: 0.85s; }
  .playing .spark:nth-child(3)  { animation-delay: 0.9s; }
  .playing .spark:nth-child(4)  { animation-delay: 0.95s; }
  .playing .spark:nth-child(5)  { animation-delay: 1.0s; }
  .playing .spark:nth-child(6)  { animation-delay: 1.05s; }
  .playing .spark:nth-child(7)  { animation-delay: 1.1s; }
  .playing .spark:nth-child(8)  { animation-delay: 1.15s; }
  .playing .spark:nth-child(9)  { animation-delay: 1.2s; }
  .playing .spark:nth-child(10) { animation-delay: 1.25s; }
  .playing .spark:nth-child(11) { animation-delay: 1.0s; }
  .playing .spark:nth-child(12) { animation-delay: 1.1s; }
  .playing .spark:nth-child(13) { animation-delay: 1.15s; }
  .playing .spark:nth-child(14) { animation-delay: 1.2s; }
  .playing .spark:nth-child(15) { animation-delay: 1.3s; }
  .playing .spark:nth-child(16) { animation-delay: 1.35s; }
  .playing .spark:nth-child(17) { animation-delay: 0.9s; }
  .playing .spark:nth-child(18) { animation-delay: 1.4s; }
  .playing .spark:nth-child(19) { animation-delay: 1.45s; }
  .playing .spark:nth-child(20) { animation-delay: 1.5s; }

  @keyframes sparkle {
    0%   { opacity: 0; transform: translate(0, 0) scale(0); }
    20%  { opacity: 1; transform: translate(calc(var(--tx) * 0.3), calc(var(--ty) * 0.3)) scale(1.5); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ── Rotating Rune Ring ────────────────────────────── */
  .rune-ring {
    position: absolute;
    width: 320px;
    height: 320px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    z-index: 7;
    animation: none;
  }
  .playing .rune-ring {
    animation: runeAppear 4s ease-out 1.2s forwards, runeSpin 8s linear 1.2s infinite;
  }
  .rune-ring svg { width: 100%; height: 100%; }
  @keyframes runeAppear {
    0%   { opacity: 0; }
    20%  { opacity: 0.5; }
    50%  { opacity: 0.2; }
    75%  { opacity: 0.2; }
    100% { opacity: 0; }
  }
  @keyframes runeSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* ── Artifact Name (above) ─────────────────────────── */
  .artifact-name {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    z-index: 30;
    text-align: center;
    animation: none;
    white-space: nowrap;
  }
  .artifact-name .name-main {
    font-size: 20px;
    font-weight: 700;
    color: rgba(200,166,78,0.9);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(200,166,78,0.4);
  }
  .artifact-name .name-location {
    font-size: 12px;
    font-weight: 400;
    color: rgba(180,200,220,0.5);
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
  .playing .artifact-name {
    animation: nameAppear 4s ease-out 1.4s forwards;
  }
  @keyframes nameAppear {
    0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    65%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── "GUARDED" Badge + Shield Symbol (below) ───────── */
  .guard-badge {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) scale(0) translateY(20px);
    opacity: 0;
    z-index: 30;
    animation: none;
    text-align: center;
  }
  .playing .guard-badge {
    animation: badgeReveal 3.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.6s forwards;
  }

  .guard-badge-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    color: #c8a64e;
    text-shadow: 0 0 20px rgba(200,166,78,0.5), 0 2px 10px rgba(0,0,0,0.5);
    text-transform: uppercase;
  }

  .guard-badge-symbol {
    font-size: 36px;
    display: block;
    margin-bottom: 6px;
    filter: drop-shadow(0 0 12px rgba(200,166,78,0.5));
  }

  .guard-badge-reward {
    font-size: 15px;
    font-weight: 600;
    color: #4ecdc4;
    text-shadow: 0 0 12px rgba(78,205,196,0.4);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  @keyframes badgeReveal {
    0%   { opacity: 0; transform: translateX(-50%) scale(0) translateY(20px); }
    15%  { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(0); }
    22%  { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    65%  { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.95) translateY(10px); }
  }

  /* ── Ground Reflection ─────────────────────────────── */
  .ground-glow {
    position: absolute;
    bottom: 40px;
    width: 280px;
    height: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(ellipse, rgba(200,166,78,0.15) 0%, transparent 70%);
    opacity: 0;
    z-index: 2;
    animation: none;
  }
  .playing .ground-glow {
    animation: groundFade 1.5s ease-out 0.8s forwards;
  }
  @keyframes groundFade {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }

  /* ── Persistent Shimmer (post-animation idle) ──────── */
  .playing .artifact-img.idle-shimmer {
    animation: idleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes idleGlow {
    0%   { box-shadow: 0 0 30px rgba(200,166,78,0.4), 0 0 60px rgba(200,166,78,0.15); filter: brightness(1); }
    100% { box-shadow: 0 0 45px rgba(200,166,78,0.6), 0 0 90px rgba(200,166,78,0.25); filter: brightness(1.08); }
  }

  /* ── Article Thumbnail (lingers after main fades) */
  .article-thumb {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: 84px; height: 84px;
    border-radius: 12px;
    object-fit: cover;
    opacity: 0;
    z-index: 25;
    border: 2px solid rgba(200,166,78,0.5);
    box-shadow: 0 0 16px rgba(200,166,78,0.3), 0 0 30px rgba(200,166,78,0.1);
  }
  .playing .article-thumb {
    animation: thumbAppear 2s cubic-bezier(0.34,1.56,0.64,1) 3.8s forwards;
  }
  @keyframes thumbAppear {
    0%   { opacity: 0; transform: translateX(-50%) scale(0); }
    30%  { opacity: 1; transform: translateX(-50%) scale(1.15); }
    50%  { opacity: 1; transform: translateX(-50%) scale(1); }
    100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
  }

  /* ── Vignette lift after artifact fades ───────────── */
  .tl-backdrop.vignette-lift::after {
    opacity: 0;
  }

  /* ── Info text ─────────────────────────────────────── */
  .info {
    position: fixed;
    bottom: 20px;
    color: #444;
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }
  .info code {
    background: rgba(200,166,78,0.1);
    color: #997;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="playAnimation()">&#9654; Play Guard Animation</button>
  <button onclick="resetAnimation()">&#8635; Reset</button>
  <span class="label">~5.5s sequence</span>
</div>

<div class="stage" id="stage">
  <!-- TL location backdrop -->
  <div class="tl-backdrop" id="tlBackdrop">
    <img src="../../img/TL508Pic.png" alt="Glastonbury 512 AD"
         onload="console.log('TL backdrop loaded OK')"
         onerror="console.warn('TL backdrop FAILED to load'); this.parentElement.style.background='linear-gradient(135deg,#1a1520,#0a0a12)';" />
  </div>

  <!-- TL location label -->
  <div class="tl-label">Glastonbury — 512 AD</div>

  <!-- Background pulse -->
  <div class="bg-pulse"></div>

  <!-- Ground reflection -->
  <div class="ground-glow"></div>

  <!-- Energy beams -->
  <div class="energy-beam"></div>
  <div class="energy-beam"></div>
  <div class="energy-beam"></div>
  <div class="energy-beam"></div>
  <div class="energy-beam"></div>

  <!-- Hex shield overlay -->
  <div class="hex-shield">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(200,166,78,0.6)" />
          <stop offset="100%" style="stop-color:rgba(100,180,255,0.3)" />
        </linearGradient>
      </defs>
      <polygon points="100,10 178,55 178,145 100,190 22,145 22,55"
               fill="none" stroke="url(#hexGrad)" stroke-width="1.5"
               stroke-dasharray="8,4" />
      <polygon points="100,25 168,63 168,137 100,175 32,137 32,63"
               fill="none" stroke="rgba(200,166,78,0.2)" stroke-width="0.8" />
    </svg>
  </div>

  <!-- Rotating rune ring -->
  <div class="rune-ring">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="runeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(200,166,78,0.5)" />
          <stop offset="50%" style="stop-color:rgba(100,180,255,0.4)" />
          <stop offset="100%" style="stop-color:rgba(200,166,78,0.5)" />
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="90" fill="none" stroke="url(#runeGrad)"
              stroke-width="0.8" stroke-dasharray="3,8,12,8" />
      <text fill="rgba(200,166,78,0.4)" font-size="8" font-family="serif">
        <textPath href="#runePath">&#x27E1; &#x25C8; &#x2B21; &#x25C7; &#x27E1; &#x25C8; &#x2B21; &#x25C7; &#x27E1; &#x25C8; &#x2B21; &#x25C7; &#x27E1; &#x25C8; &#x2B21; &#x25C7;</textPath>
      </text>
      <path id="runePath" d="M 100,8 A 92,92 0 1,1 99.9,8" fill="none" />
    </svg>
  </div>

  <!-- Artifact image -->
  <div class="artifact-wrap">
    <img class="artifact-img" id="artifactImg"
         src="../../img/ART108.png"
         alt="Excalibur Sword"
         onerror="this.style.background='linear-gradient(135deg,#2a1f4e,#1a1a2e)';this.style.opacity=1;" />
  </div>

  <!-- Sparkle particles -->

<div class="info">
  Pure CSS animation &bull; No JS dependencies &bull; BGA-compatible<br>
  <code>TL508Pic.png</code> backdrop + <code>ART108.png</code> artifact
</div>

<script>
  function playAnimation() {
    const stage = document.getElementById('stage');
    const img = document.getElementById('artifactImg');
    const backdrop = document.getElementById('tlBackdrop');
    // Reset
    stage.classList.remove('playing');
    img.classList.remove('idle-shimmer');
    backdrop.classList.remove('idle-breathe');
    void stage.offsetWidth; // force reflow
    // Play
    stage.classList.add('playing');
    // After artifact fades, lift vignette to reveal full TL
    setTimeout(() => {
      const vignette = backdrop.querySelector('::after');
      backdrop.style.setProperty('--vignette-opacity', '0');
    }, 3500);
    // Add a class to fade vignette via CSS
    setTimeout(() => {
      backdrop.classList.add('vignette-lift');
    }, 3200);
  }

  function resetAnimation() {
    const stage = document.getElementById('stage');
    stage.classList.remove('playing');
    document.getElementById('tlBackdrop').classList.remove('vignette-lift');
  }

  // Auto-play on load
  setTimeout(playAnimation, 500);
</script>
