<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos — Kronos Steal (Batch) Animation Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  .controls {
    position: fixed; top: 20px; z-index: 100;
    display: flex; gap: 12px; align-items: center;
  }
  .controls button {
    padding: 10px 24px; border: 2px solid #9b59b6; border-radius: 8px;
    background: rgba(155,89,182,0.15); color: #bb7dd8;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .controls button:hover {
    background: rgba(155,89,182,0.35);
    box-shadow: 0 0 20px rgba(155,89,182,0.3);
  }
  .controls .label { color: #665; font-size: 13px; }

  .stage {
    position: relative; width: 440px; height: 520px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; border-radius: 20px;
  }

  /* ── Dark void background ──────────────────────────── */
  .bg-void {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, rgba(30,10,40,0.9) 0%, rgba(5,2,10,0.98) 70%);
    opacity: 0;
  }
  .playing .bg-void { animation: stealBgIn 6s ease-out forwards; }
  @keyframes stealBgIn {
    0% { opacity:0; } 8% { opacity:1; } 100% { opacity:1; }
  }

  /* ── Kronos looming behind ─────────────────────────── */
  .kronos-loom {
    position: absolute; z-index: 2;
    width: 360px; height: 360px; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.5);
    opacity: 0;
  }
  .kronos-loom img {
    width: 100%; height: 100%; object-fit: contain;
    filter: brightness(0.25) saturate(0.3) hue-rotate(-10deg);
  }
  .playing .kronos-loom { animation: kronosLoom 6s ease-out forwards; }
  @keyframes kronosLoom {
    0%   { opacity:0; transform: translate(-50%,-50%) scale(0.5); }
    18%  { opacity:0.5; transform: translate(-50%,-50%) scale(1); }
    35%  { opacity:0.7; transform: translate(-50%,-50%) scale(1.05); }
    55%  { opacity:0.8; transform: translate(-50%,-50%) scale(1.08); }
    100% { opacity:0.6; transform: translate(-50%,-50%) scale(1.1); }
  }

  /* ── Purple menace pulse ───────────────────────────── */
  .menace-pulse {
    position: absolute; inset: 0; z-index: 3;
    background: radial-gradient(circle, rgba(155,89,182,0.4) 0%, transparent 55%);
    opacity: 0; border-radius: 20px;
  }
  .playing .menace-pulse { animation: menacePulse 6s ease-in-out forwards; }
  @keyframes menacePulse {
    0%   { opacity:0; }
    12%  { opacity:0.6; }
    22%  { opacity:0.2; }
    32%  { opacity:0.5; }
    42%  { opacity:0.1; }
    52%  { opacity:0.3; }
    100% { opacity:0.15; }
  }

  /* ── Kronos eye glints ─────────────────────────────── */
  .eye-glint {
    position: absolute; width: 8px; height: 8px;
    border-radius: 50%; z-index: 3;
    background: rgba(200,50,50,0.9);
    box-shadow: 0 0 15px rgba(200,50,50,0.8), 0 0 30px rgba(200,50,50,0.4);
    opacity: 0;
  }
  .eye-glint:nth-child(1) { top: 36%; left: 44%; }
  .eye-glint:nth-child(2) { top: 36%; left: 54%; }
  .playing .eye-glint { animation: eyeGlint 5.5s ease-in-out 0.8s forwards; }
  @keyframes eyeGlint {
    0%   { opacity:0; transform: scale(0); }
    10%  { opacity:0.9; transform: scale(1.2); }
    15%  { opacity:0.6; transform: scale(0.8); }
    20%  { opacity:0.8; transform: scale(1); }
    60%  { opacity:0.7; }
    80%  { opacity:0.4; }
    100% { opacity:0.3; transform: scale(0.6); }
  }

  /* ── Dark vortex (centre) ──────────────────────────── */
  .dark-vortex {
    position: absolute; width: 200px; height: 200px;
    z-index: 4; opacity: 0; border-radius: 50%;
    background: radial-gradient(circle,
      rgba(20,5,30,0.9) 0%, rgba(80,30,100,0.3) 40%, transparent 70%);
    box-shadow: 0 0 60px rgba(100,40,130,0.4), inset 0 0 40px rgba(0,0,0,0.8);
  }
  .playing .dark-vortex {
    animation: vortexAppear 6s ease-out 2.0s forwards,
               vortexSpin 3s linear 2.0s infinite;
  }
  @keyframes vortexAppear {
    0%   { opacity:0; transform: scale(0); }
    15%  { opacity:0.8; transform: scale(0.6); }
    40%  { opacity:1; transform: scale(1.2); }
    70%  { opacity:1; transform: scale(1.5); }
    100% { opacity:0.8; transform: scale(1.8); }
  }
  @keyframes vortexSpin {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(30deg); }
  }

  .vortex-ring {
    position: absolute; width: 160px; height: 160px;
    z-index: 5; opacity: 0; border-radius: 50%;
    border: 2px solid rgba(155,89,182,0.4);
    box-shadow: 0 0 20px rgba(155,89,182,0.2), inset 0 0 20px rgba(80,30,100,0.3);
  }
  .playing .vortex-ring {
    animation: vortexRingIn 4s ease-out 2.2s forwards,
               vortexRingSpin 2s linear 2.2s infinite;
  }
  @keyframes vortexRingIn {
    0%   { opacity:0; transform: scale(0) rotate(0deg); }
    30%  { opacity:0.7; transform: scale(1) rotate(90deg); }
    60%  { opacity:0.5; transform: scale(1.3) rotate(180deg); }
    100% { opacity:0.3; transform: scale(1.6) rotate(360deg); }
  }
  @keyframes vortexRingSpin {
    0%   { transform: scale(1.3) rotate(0deg); }
    100% { transform: scale(1.3) rotate(360deg); }
  }

  /* ═══════════════════════════════════════════════════════
     BATCH STOLEN ARTICLES: 3 cards fan out then
     all get sucked into the vortex together
     ═══════════════════════════════════════════════════════ */

  .stolen-article {
    position: absolute; z-index: 10;
    width: 110px; height: 140px;
    border-radius: 10px; overflow: hidden;
    opacity: 0;
    box-shadow: 0 0 25px rgba(200,166,78,0.4), 0 6px 20px rgba(0,0,0,0.5);
    border: 2px solid rgba(200,166,78,0.4);
  }
  .stolen-article img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Card 1: fans slightly left */
  .playing .stolen-article.card-1 {
    animation: cardFanLeft 5.5s cubic-bezier(0.25,0.46,0.45,0.94) 0.2s forwards;
  }
  @keyframes cardFanLeft {
    0%   { opacity:0; transform: scale(0.4) translateY(40px); }
    10%  { opacity:1; transform: scale(0.95) translateY(-5px); }
    18%  { opacity:1; transform: scale(0.9) translate(-70px, -10px) rotate(-12deg);
           box-shadow: 0 0 30px rgba(200,166,78,0.5); }
    /* Hold fanned position */
    35%  { opacity:1; transform: scale(0.9) translate(-70px, -10px) rotate(-12deg); }
    /* Shake */
    40%  { transform: scale(0.9) translate(-74px, -12px) rotate(-14deg); }
    44%  { transform: scale(0.9) translate(-66px, -8px) rotate(-10deg); }
    48%  { transform: scale(0.85) translate(-70px, -10px) rotate(-12deg);
           border-color: rgba(155,89,182,0.6);
           box-shadow: 0 0 35px rgba(155,89,182,0.5); }
    /* Sucked into vortex */
    65%  { opacity:0.7; transform: scale(0.5) translate(-20px, 5px) rotate(20deg);
           filter: brightness(0.6) saturate(0.4); }
    80%  { opacity:0.3; transform: scale(0.15) translate(0,0) rotate(50deg);
           filter: brightness(0.2); }
    100% { opacity:0; transform: scale(0) rotate(80deg); }
  }

  /* Card 2: stays centre */
  .playing .stolen-article.card-2 {
    animation: cardFanCenter 5.5s cubic-bezier(0.25,0.46,0.45,0.94) 0.3s forwards;
  }
  @keyframes cardFanCenter {
    0%   { opacity:0; transform: scale(0.4) translateY(40px); }
    10%  { opacity:1; transform: scale(1.0) translateY(-5px); }
    18%  { opacity:1; transform: scale(0.95) translate(0, -5px) rotate(0deg);
           box-shadow: 0 0 40px rgba(200,166,78,0.6); }
    35%  { opacity:1; transform: scale(0.95) translate(0, -5px) rotate(0deg); }
    40%  { transform: scale(0.95) translate(-5px, -7px) rotate(-2deg); }
    44%  { transform: scale(0.95) translate(5px, -3px) rotate(2deg); }
    48%  { transform: scale(0.9) translate(0, -5px) rotate(0);
           border-color: rgba(155,89,182,0.6);
           box-shadow: 0 0 40px rgba(155,89,182,0.5); }
    65%  { opacity:0.7; transform: scale(0.5) rotate(15deg);
           filter: brightness(0.6) saturate(0.4); }
    80%  { opacity:0.3; transform: scale(0.15) rotate(40deg);
           filter: brightness(0.2); }
    100% { opacity:0; transform: scale(0) rotate(70deg); }
  }

  /* Card 3: fans slightly right */
  .playing .stolen-article.card-3 {
    animation: cardFanRight 5.5s cubic-bezier(0.25,0.46,0.45,0.94) 0.4s forwards;
  }
  @keyframes cardFanRight {
    0%   { opacity:0; transform: scale(0.4) translateY(40px); }
    10%  { opacity:1; transform: scale(0.95) translateY(-5px); }
    18%  { opacity:1; transform: scale(0.9) translate(70px, -10px) rotate(12deg);
           box-shadow: 0 0 30px rgba(200,166,78,0.5); }
    35%  { opacity:1; transform: scale(0.9) translate(70px, -10px) rotate(12deg); }
    40%  { transform: scale(0.9) translate(66px, -8px) rotate(10deg); }
    44%  { transform: scale(0.9) translate(74px, -12px) rotate(14deg); }
    48%  { transform: scale(0.85) translate(70px, -10px) rotate(12deg);
           border-color: rgba(155,89,182,0.6);
           box-shadow: 0 0 35px rgba(155,89,182,0.5); }
    65%  { opacity:0.7; transform: scale(0.5) translate(20px, 5px) rotate(-20deg);
           filter: brightness(0.6) saturate(0.4); }
    80%  { opacity:0.3; transform: scale(0.15) translate(0,0) rotate(-50deg);
           filter: brightness(0.2); }
    100% { opacity:0; transform: scale(0) rotate(-80deg); }
  }

  /* ── Shadow tendrils ───────────────────────────────── */
  .tendril {
    position: absolute; z-index: 8; opacity: 0;
    width: 4px; height: 120px; border-radius: 2px;
    background: linear-gradient(to top,
      rgba(80,30,100,0.6) 0%, rgba(155,89,182,0.3) 50%, transparent 100%);
    transform-origin: bottom center;
  }
  .tendril:nth-child(1) { left: 35%; bottom: 35%; transform: rotate(-25deg); }
  .tendril:nth-child(2) { left: 45%; bottom: 33%; transform: rotate(-8deg); }
  .tendril:nth-child(3) { left: 50%; bottom: 32%; transform: rotate(5deg); }
  .tendril:nth-child(4) { left: 55%; bottom: 33%; transform: rotate(12deg); }
  .tendril:nth-child(5) { left: 65%; bottom: 35%; transform: rotate(28deg); }
  .playing .tendril { animation: tendrilReach 2.5s ease-out forwards; }
  .playing .tendril:nth-child(1) { animation-delay: 1.5s; }
  .playing .tendril:nth-child(2) { animation-delay: 1.6s; }
  .playing .tendril:nth-child(3) { animation-delay: 1.55s; }
  .playing .tendril:nth-child(4) { animation-delay: 1.65s; }
  .playing .tendril:nth-child(5) { animation-delay: 1.5s; }
  @keyframes tendrilReach {
    0%   { opacity:0; height:0; }
    30%  { opacity:0.7; height:120px; }
    60%  { opacity:0.5; height:140px; }
    100% { opacity:0; height:160px; }
  }

  /* ── Dark energy particles (converge inward) ───────── */
  .dark-particle {
    position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: rgba(155,89,182,0.7); opacity: 0; z-index: 6;
    box-shadow: 0 0 6px rgba(155,89,182,0.4);
  }
  .playing .dark-particle { animation: darkParticle 2.5s ease-in forwards; }
  .dark-particle:nth-child(1)  { top:15%; left:20%;  --px:90px;  --py:140px; }
  .dark-particle:nth-child(2)  { top:10%; left:60%;  --px:-50px; --py:160px; }
  .dark-particle:nth-child(3)  { top:30%; left:85%;  --px:-140px;--py:70px;  }
  .dark-particle:nth-child(4)  { top:70%; left:15%;  --px:120px; --py:-80px; }
  .dark-particle:nth-child(5)  { top:80%; left:70%;  --px:-80px; --py:-120px;}
  .dark-particle:nth-child(6)  { top:25%; left:10%;  --px:140px; --py:100px; }
  .dark-particle:nth-child(7)  { top:85%; left:40%;  --px:20px;  --py:-150px;}
  .dark-particle:nth-child(8)  { top:20%; left:80%;  --px:-110px;--py:110px; }
  .playing .dark-particle:nth-child(1) { animation-delay:2.0s; }
  .playing .dark-particle:nth-child(2) { animation-delay:2.2s; }
  .playing .dark-particle:nth-child(3) { animation-delay:2.4s; }
  .playing .dark-particle:nth-child(4) { animation-delay:2.1s; }
  .playing .dark-particle:nth-child(5) { animation-delay:2.5s; }
  .playing .dark-particle:nth-child(6) { animation-delay:2.3s; }
  .playing .dark-particle:nth-child(7) { animation-delay:2.45s; }
  .playing .dark-particle:nth-child(8) { animation-delay:2.15s; }
  @keyframes darkParticle {
    0%   { opacity:0; transform: translate(0,0) scale(1); }
    20%  { opacity:0.8; }
    100% { opacity:0; transform: translate(var(--px), var(--py)) scale(0); }
  }

  /* ── Event name label (top) ────────────────────────── */
  .event-name {
    position: absolute; top: 35px; left: 50%;
    transform: translateX(-50%); opacity: 0; z-index: 20;
    text-align: center; white-space: nowrap;
  }
  .event-name-main {
    font-size: 15px; font-weight: 700;
    color: rgba(187,125,216,0.9); letter-spacing: 2px;
    text-shadow: 0 0 15px rgba(155,89,182,0.4);
  }
  .event-name-sub {
    font-size: 11px; font-weight: 400;
    color: rgba(180,160,200,0.5); letter-spacing: 1.5px; margin-top: 3px;
  }
  .playing .event-name { animation: stealLabelIn 4s ease-out 0.4s forwards; }
  @keyframes stealLabelIn {
    0%   { opacity:0; transform: translateX(-50%) translateY(8px); }
    12%  { opacity:1; transform: translateX(-50%) translateY(0); }
    50%  { opacity:1; }
    70%  { opacity:0; }
    100% { opacity:0; }
  }

  /* ── "STOLEN" Badge with count ─────────────────────── */
  .steal-badge {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(-50%) scale(0); opacity: 0;
    z-index: 20; text-align: center;
  }
  .playing .steal-badge { animation: stealBadgeIn 3.5s cubic-bezier(0.34,1.56,0.64,1) 2.8s forwards; }
  .steal-badge-icon { font-size: 38px; display: block; margin-bottom: 6px; }
  .steal-badge-text {
    font-size: 22px; font-weight: 800; letter-spacing: 6px;
    color: #bb7dd8;
    text-shadow: 0 0 25px rgba(155,89,182,0.6), 0 0 50px rgba(100,40,130,0.3),
                 0 2px 10px rgba(0,0,0,0.7);
    text-transform: uppercase;
  }
  .steal-badge-count {
    font-size: 15px; font-weight: 700; color: rgba(255,100,100,0.9);
    text-shadow: 0 0 12px rgba(255,68,68,0.4);
    margin-top: 4px; letter-spacing: 2px;
  }
  .steal-badge-sub {
    font-size: 11px; font-weight: 500; color: rgba(200,166,78,0.6);
    letter-spacing: 1.5px; margin-top: 4px;
    text-shadow: 0 0 6px rgba(200,166,78,0.2);
  }
  @keyframes stealBadgeIn {
    0%   { opacity:0; transform: translateX(-50%) scale(0); }
    15%  { opacity:1; transform: translateX(-50%) scale(1.15); }
    25%  { transform: translateX(-50%) scale(1); }
    70%  { opacity:1; }
    100% { opacity:0.9; transform: translateX(-50%) scale(1); }
  }

  .info {
    position: fixed; bottom: 20px; color: #444;
    font-size: 12px; text-align: center; line-height: 1.6;
  }
  .info code {
    background: rgba(155,89,182,0.1); color: #96c;
    padding: 2px 6px; border-radius: 3px; font-size: 11px;
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="playAnimation()">&#9654; Play Kronos Steal (Batch)</button>
  <button onclick="resetAnimation()">&#8635; Reset</button>
  <span class="label">~6s &bull; Kronos seizes 3 articles &bull; batch vortex</span>
</div>

<div class="stage" id="stage">
  <div class="bg-void"></div>

  <!-- Kronos looming behind -->
  <div class="kronos-loom">
    <img src="../../img/KRONOS.png" alt="Kronos"
         onerror="this.parentElement.style.background='radial-gradient(circle,rgba(60,20,80,0.5),transparent)';" />
  </div>

  <div class="menace-pulse"></div>

  <div class="eye-glint"></div>
  <div class="eye-glint"></div>

  <!-- Shadow tendrils (wider spread for batch) -->
  <div class="tendril"></div><div class="tendril"></div><div class="tendril"></div>
  <div class="tendril"></div><div class="tendril"></div>

  <!-- Dark energy particles -->
  <div class="dark-particle"></div><div class="dark-particle"></div>
  <div class="dark-particle"></div><div class="dark-particle"></div>
  <div class="dark-particle"></div><div class="dark-particle"></div>
  <div class="dark-particle"></div><div class="dark-particle"></div>

  <!-- Dark vortex -->
  <div class="dark-vortex"></div>
  <div class="vortex-ring"></div>

  <!-- 3 articles being stolen — fan out then all sucked in -->
  <div class="stolen-article card-1">
    <img src="../../img/ART108.png" alt="Excalibur"
         onerror="this.style.background='linear-gradient(135deg,#2a1a10,#0a0808)';this.style.opacity=1;" />
  </div>
  <div class="stolen-article card-2">
    <img src="../../img/ART123.png" alt="Amethyst"
         onerror="this.style.background='linear-gradient(135deg,#1a2a4e,#0a0808)';this.style.opacity=1;" />
  </div>
  <div class="stolen-article card-3">
    <img src="../../img/ART112.png" alt="Rosetta Stone"
         onerror="this.style.background='linear-gradient(135deg,#1a2010,#0a0808)';this.style.opacity=1;" />
  </div>

  <div class="event-name">
    <div class="event-name-main">&#x1F480; Kronos Strikes</div>
    <div class="event-name-sub">Articles Seized &bull; Kronos Phase</div>
  </div>

  <div class="steal-badge">
    <span class="steal-badge-icon">&#x1F480;</span>
    <div class="steal-badge-text">Stolen</div>
    <div class="steal-badge-count">3 Articles Seized</div>
    <div class="steal-badge-sub">&#x2620;&#xFE0F; Claimed by Kronos</div>
  </div>
</div>

<div class="info">
  Kronos Batch Steal &bull; 3 articles fan out then sucked into vortex together<br>
  <code>ART108</code> + <code>ART123</code> + <code>ART112</code> &bull; Purple menace &bull; Count in badge
</div>

<script>
  function playAnimation() {
    const stage = document.getElementById('stage');
    stage.classList.remove('playing');
    void stage.offsetWidth;
    stage.classList.add('playing');
  }
  function resetAnimation() {
    document.getElementById('stage').classList.remove('playing');
  }
  setTimeout(playAnimation, 500);
</script>
</body>
</html>
