<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos — Time Travel Animation Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  .controls {
    position: fixed; top: 20px; z-index: 100;
    display: flex; gap: 12px; align-items: center;
  }
  .controls button {
    padding: 10px 24px; border: 2px solid #a78bfa; border-radius: 8px;
    background: rgba(167,139,250,0.15); color: #a78bfa;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .controls button:hover {
    background: rgba(167,139,250,0.35);
    box-shadow: 0 0 20px rgba(167,139,250,0.3);
  }
  .controls .label { color: #665; font-size: 13px; }

  /* ── Stage ──────────────────────────────────────────── */
  .stage {
    position: relative; width: 440px; height: 520px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; border-radius: 20px;
  }

  /* ══════════════════════════════════════════════════════
     TIME TRAVEL:
     1. Origin TL at full brightness
     2. Concentric tunnel discs shrink in 3 rapid pulses
     3. Flash at tunnel centre
     4. Destination TL materialises out
     ══════════════════════════════════════════════════════ */

  /* ── Origin TL ─────────────────────────────────────── */
  .tl-origin {
    position: absolute; width: 440px; height: 520px;
    top: 0; left: 0; z-index: 2;
    overflow: hidden; border-radius: 20px; opacity: 0;
  }
  .tl-origin img {
    width: 85%; height: 85%; object-fit: cover; border-radius: 12px;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    filter: brightness(1.0) saturate(1.0);
  }
  .playing .tl-origin {
    animation: ttOriginLife 5.5s ease-in-out forwards;
  }
  @keyframes ttOriginLife {
    0%  { opacity:0; }
    8%  { opacity:1; }
    30% { opacity:1; }
    55% { opacity:0; transform: scale(0.3) rotate(180deg); }
    100%{ opacity:0; transform: scale(0) rotate(360deg); }
  }
  .playing .tl-origin img {
    animation: ttOriginImgSwirl 5.5s ease-in-out forwards;
  }
  @keyframes ttOriginImgSwirl {
    0%  { filter: brightness(1.0) saturate(1.0); }
    25% { filter: brightness(1.0) saturate(1.0); }
    40% { filter: brightness(1.5) saturate(0.3) blur(4px); }
    55% { filter: brightness(2.0) saturate(0) blur(10px); }
    100%{ filter: brightness(2.0) saturate(0) blur(10px); }
  }

  /* ── Origin Label ──────────────────────────────────── */
  .tl-origin-label {
    position: absolute; top: 18px; left: 50%;
    transform: translateX(-50%); opacity: 0; z-index: 30;
    font-size: 13px; font-weight: 600;
    color: rgba(220,230,240,0.9); letter-spacing: 3px;
    text-transform: uppercase; white-space: nowrap;
    text-shadow: 0 0 15px rgba(167,139,250,0.5);
  }
  .playing .tl-origin-label {
    animation: ttOriginLabelLife 5.5s ease-in-out forwards;
  }
  @keyframes ttOriginLabelLife {
    0%  { opacity:0; }
    10% { opacity:1; }
    30% { opacity:1; }
    50% { opacity:0; transform: translateX(-50%) scale(0.7); }
    100%{ opacity:0; }
  }

  /* ══════════════════════════════════════════════════════
     TUNNEL DISCS: 3 concentric rings that rapidly shrink
     inward in quick succession → tunnelling effect
     ══════════════════════════════════════════════════════ */
  .tunnel-discs {
    position: absolute;
    width: 400px; height: 400px;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    z-index: 10;
    pointer-events: none;
  }

  .tunnel-disc {
    position: absolute;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(2);
    opacity: 0;
    border: 3px solid transparent;
    box-shadow: inset 0 0 30px rgba(167,139,250,0.3);
  }

  /* Disc 1 — outermost, fires first */
  .tunnel-disc:nth-child(1) {
    width: 380px; height: 380px;
    border-color: rgba(167,139,250,0.7);
    border-style: solid;
    box-shadow: 0 0 25px rgba(167,139,250,0.4),
                inset 0 0 40px rgba(167,139,250,0.2);
  }
  /* Disc 2 — middle */
  .tunnel-disc:nth-child(2) {
    width: 280px; height: 280px;
    border-color: rgba(100,180,255,0.7);
    border-style: solid;
    border-width: 3px;
    box-shadow: 0 0 20px rgba(100,180,255,0.4),
                inset 0 0 30px rgba(100,180,255,0.2);
  }
  /* Disc 3 — innermost, fires last */
  .tunnel-disc:nth-child(3) {
    width: 180px; height: 180px;
    border-color: rgba(78,205,196,0.8);
    border-style: solid;
    border-width: 4px;
    box-shadow: 0 0 15px rgba(78,205,196,0.5),
                inset 0 0 20px rgba(78,205,196,0.3);
  }

  /* Each disc: appears big → shrinks to zero rapidly */
  .playing .tunnel-disc:nth-child(1) { animation: ttDiscShrink 0.6s ease-in 1.5s forwards; }
  .playing .tunnel-disc:nth-child(2) { animation: ttDiscShrink 0.5s ease-in 1.7s forwards; }
  .playing .tunnel-disc:nth-child(3) { animation: ttDiscShrink 0.4s ease-in 1.9s forwards; }

  @keyframes ttDiscShrink {
    0%  { opacity: 0; transform: translate(-50%,-50%) scale(2.0); }
    15% { opacity: 1; transform: translate(-50%,-50%) scale(1.5); }
    40% { opacity: 1; transform: translate(-50%,-50%) scale(0.8); }
    70% { opacity: 0.8; transform: translate(-50%,-50%) scale(0.3); }
    100%{ opacity: 0; transform: translate(-50%,-50%) scale(0); }
  }

  /* ── Tunnel afterglow rings (persist briefly after shrink) */
  .tunnel-disc::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid inherit;
    opacity: 0;
  }

  /* ── Vortex centre core glow ───────────────────────── */
  .vortex-core {
    position: absolute;
    width: 80px; height: 80px;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(167,139,250,0.8) 0%, rgba(100,180,255,0.4) 40%, transparent 70%);
    z-index: 11; opacity: 0; filter: blur(3px);
  }
  .playing .vortex-core {
    animation: ttCoreGlow 5.5s ease-in-out forwards;
  }
  @keyframes ttCoreGlow {
    0%  { opacity:0; transform: translate(-50%,-50%) scale(0); }
    35% { opacity:0; }
    42% { opacity:1; transform: translate(-50%,-50%) scale(1.5); }
    52% { opacity:1; transform: translate(-50%,-50%) scale(2.5); }
    65% { opacity:0.5; transform: translate(-50%,-50%) scale(3); filter: blur(8px); }
    75% { opacity:0; }
    100%{ opacity:0; }
  }

  /* ── Flash ─────────────────────────────────────────── */
  .travel-flash {
    position: absolute; inset: 0;
    background: radial-gradient(circle, rgba(167,139,250,0.9) 0%, rgba(100,180,255,0.5) 30%, transparent 70%);
    z-index: 12; opacity: 0; border-radius: 20px;
  }
  .playing .travel-flash {
    animation: ttFlash 5.5s ease-in-out forwards;
  }
  @keyframes ttFlash {
    0%  { opacity:0; }
    45% { opacity:0; }
    50% { opacity:1; }
    58% { opacity:0.8; }
    66% { opacity:0; }
    100%{ opacity:0; }
  }

  /* ── Destination TL ────────────────────────────────── */
  .tl-dest {
    position: absolute; width: 440px; height: 520px;
    top: 0; left: 0; z-index: 3;
    overflow: hidden; border-radius: 20px; opacity: 0;
  }
  .tl-dest img {
    width: 85%; height: 85%; object-fit: cover; border-radius: 12px;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    filter: brightness(0.3) saturate(0.3) blur(4px);
  }
  .playing .tl-dest {
    animation: ttDestAppear 5.5s ease-out forwards;
  }
  @keyframes ttDestAppear {
    0%  { opacity:0; transform: scale(0.3) rotate(-90deg); }
    55% { opacity:0; transform: scale(0.3) rotate(-90deg); }
    65% { opacity:0.5; transform: scale(0.8) rotate(-20deg); }
    75% { opacity:1; transform: scale(1.05) rotate(2deg); }
    82% { opacity:1; transform: scale(1.0) rotate(0deg); }
    100%{ opacity:1; transform: scale(1.0) rotate(0deg); }
  }
  .playing .tl-dest img {
    animation: ttDestImgReveal 5.5s ease-out forwards;
  }
  @keyframes ttDestImgReveal {
    0%  { filter: brightness(0.3) saturate(0.3) blur(4px); }
    65% { filter: brightness(0.3) saturate(0.3) blur(4px); }
    80% { filter: brightness(0.9) saturate(0.9) blur(0); }
    100%{ filter: brightness(1.0) saturate(1.0) blur(0); }
  }

  /* ── Destination Label ─────────────────────────────── */
  .tl-dest-label {
    position: absolute; top: 18px; left: 50%;
    transform: translateX(-50%); opacity: 0; z-index: 30;
    font-size: 13px; font-weight: 600;
    color: rgba(220,230,240,0.9); letter-spacing: 3px;
    text-transform: uppercase; white-space: nowrap;
    text-shadow: 0 0 15px rgba(46,194,126,0.5);
  }
  .playing .tl-dest-label {
    animation: ttDestLabelAppear 5.5s ease-out forwards;
  }
  @keyframes ttDestLabelAppear {
    0%  { opacity:0; transform: translateX(-50%) translateY(10px); }
    72% { opacity:0; transform: translateX(-50%) translateY(10px); }
    82% { opacity:1; transform: translateX(-50%) translateY(0); }
    100%{ opacity:1; }
  }

  /* ── "ARRIVED" Badge ───────────────────────────────── */
  .travel-badge {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(-50%) scale(0); opacity: 0;
    z-index: 30; text-align: center;
  }
  .playing .travel-badge {
    animation: ttBadgeReveal 2.5s cubic-bezier(0.34,1.56,0.64,1) 3.8s forwards;
  }
  .travel-badge-symbol {
    font-size: 36px; display: block; margin-bottom: 6px;
    filter: drop-shadow(0 0 12px rgba(46,194,126,0.5));
  }
  .travel-badge-text {
    font-size: 22px; font-weight: 700; letter-spacing: 6px;
    color: #2ec27e;
    text-shadow: 0 0 20px rgba(46,194,126,0.5), 0 2px 10px rgba(0,0,0,0.5);
    text-transform: uppercase;
  }
  @keyframes ttBadgeReveal {
    0%  { opacity:0; transform: translateX(-50%) scale(0) translateY(20px); }
    20% { opacity:1; transform: translateX(-50%) scale(1.1) translateY(0); }
    30% { opacity:1; transform: translateX(-50%) scale(1) translateY(0); }
    75% { opacity:1; }
    100%{ opacity:0; transform: translateX(-50%) scale(0.95) translateY(10px); }
  }

  /* ── Arrow ─────────────────────────────────────────── */
  .travel-arrow {
    position: absolute; bottom: 120px; left: 50%;
    transform: translateX(-50%); z-index: 31; opacity: 0;
    font-size: 11px; font-weight: 500;
    color: rgba(167,139,250,0.7); letter-spacing: 2px;
    text-align: center; white-space: nowrap;
  }
  .playing .travel-arrow {
    animation: ttArrowShow 5.5s ease-out forwards;
  }
  @keyframes ttArrowShow {
    0%  { opacity:0; }
    78% { opacity:0; }
    85% { opacity:0.8; }
    95% { opacity:0.8; }
    100%{ opacity:0; }
  }

  .info {
    position: fixed; bottom: 20px; color: #444;
    font-size: 12px; text-align: center; line-height: 1.6;
  }
  .info code {
    background: rgba(167,139,250,0.1); color: #a78bfa;
    padding: 2px 6px; border-radius: 3px; font-size: 11px;
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="playAnimation()">&#9654; Play Time Travel</button>
  <button onclick="resetAnimation()">&#8635; Reset</button>
  <span class="label">~5.5s &bull; tunnel discs &bull; origin &rarr; destination</span>
</div>

<div class="stage" id="stage">
  <!-- Origin TL -->
  <div class="tl-origin">
    <img src="../../img/TL508Pic.png" alt="Glastonbury 512 AD"
         onerror="this.parentElement.style.background='linear-gradient(135deg,#1a1520,#2a1f3e)';" />
  </div>
  <div class="tl-origin-label">Glastonbury — 512 AD</div>

  <!-- Tunnel discs — 3 concentric rings that shrink in rapid succession -->
  <div class="tunnel-discs">
    <div class="tunnel-disc"></div>
    <div class="tunnel-disc"></div>
    <div class="tunnel-disc"></div>
  </div>

  <!-- Centre glow -->
  <div class="vortex-core"></div>

  <!-- Flash at transition peak -->
  <div class="travel-flash"></div>

  <!-- Destination TL -->
  <div class="tl-dest">
    <img src="../../img/TL520Pic.png" alt="Alexandria 48 BC"
         onerror="this.parentElement.style.background='linear-gradient(135deg,#152030,#0a1520)';" />
  </div>
  <div class="tl-dest-label">Alexandria — 48 BC</div>

  <!-- Direction arrow -->
  <div class="travel-arrow">GLASTONBURY 512 AD &nbsp;&#x27A1;&#xFE0F;&nbsp; ALEXANDRIA 48 BC</div>

  <!-- ARRIVED badge -->
  <div class="travel-badge">
    <span class="travel-badge-symbol">&#x1F30D;</span>
    <div class="travel-badge-text">Arrived</div>
  </div>
</div>

<div class="info">
  Time travel &bull; 3 concentric tunnel discs shrink rapidly for tunnelling effect<br>
  <code>TL508Pic.png</code> origin &rarr; <code>TL520Pic.png</code> destination
</div>

<script>
  function playAnimation() {
    const stage = document.getElementById('stage');
    stage.classList.remove('playing');
    void stage.offsetWidth;
    stage.classList.add('playing');
  }
  function resetAnimation() {
    document.getElementById('stage').classList.remove('playing');
  }
  setTimeout(playAnimation, 500);
</script>
</body>
</html>
